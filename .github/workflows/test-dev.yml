name: Node.js CI

on:
  push:
    branches: '*'
  pull_request:
    branches: main

env:
  BUILTIN_PYTHON_VERSION: 3.12.8

jobs:
  shared_python:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-20.04, ubuntu-22.04, ubuntu-24.04, macos-13, macos-14, windows-2019]
        node-version: [16.x, 18.x, 20.x, 22.x, 23.x]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        exclude:
          - node-version: 16.x
            platform: ubuntu-22.04
          - node-version: 16.x
            platform: ubuntu-24.04
          - node-version: 16.x
            python-version: 3.12
          - node-version: 16.x
            python-version: 3.13
          - platform: ubuntu-24.04
            python-version: 3.8
          - platform: ubuntu-20.04
            node-version: 23.x
          - platform: ubuntu-20.04
            python-version: 3.13

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: npm install --ignore-scripts
      - run: npx @mapbox/node-pre-gyp configure
      - run: npx @mapbox/node-pre-gyp build -j max
      - run: python3 -m pip install --upgrade pip
      - run: pip3 install -r test/requirements.txt
      - run: |
          for I in {1..50}; do npx mocha --repeats 20; done
        shell: bash
