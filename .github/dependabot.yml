version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      # node -p 'require("crypto").createHash("md5").update("pymport").digest("buffer")[0] % 15'
      cronjob: "0 5 3/15 * *"
    open-pull-requests-limit: 1
    groups:
      npm:
        patterns:
        - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
